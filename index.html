<!DOCTYPE html>
<html lang="en" class="bg-gradient-to-br from-green-50 to-emerald-50 min-h-screen">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmFlow - Daily Farming Tasks + Weather</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FullCalendar CDN -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Our custom styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-gray-800 antialiased">

    <!-- Header -->
    <header class="bg-gradient-to-r from-emerald-700 to-green-700 text-white py-6 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i class="fas fa-tractor text-3xl"></i>
                <h1 class="text-3xl font-bold">FarmFlow</h1>
            </div>
            <p class="text-lg opacity-90">Daily Tasks, Live Calendar & Farming Weather</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Add Task Form -->
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-10 border border-green-100">
            <h2 class="text-2xl font-semibold text-emerald-800 mb-6 flex items-center gap-3">
                <i class="fas fa-plus-circle text-green-600"></i> Add New Farming Task
            </h2>
            <form id="task-form" class="flex flex-col sm:flex-row gap-4">
                <input type="date" id="task-date" required class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
                <input type="text" id="task-title" placeholder="e.g., Irrigate tomatoes • Check soil pH • Harvest okra" required class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-medium px-8 py-3 rounded-lg transition shadow-md flex items-center gap-2">
                    <i class="fas fa-save"></i> Save Task
                </button>
            </form>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Calendar -->
            <div class="lg:col-span-2 bg-white rounded-2xl shadow-xl overflow-hidden border border-green-100">
                <div class="p-6 border-b border-gray-100">
                    <h2 class="text-2xl font-semibold text-emerald-800 flex items-center gap-3">
                        <i class="fas fa-calendar-alt text-green-600"></i> Live Farming Calendar
                    </h2>
                </div>
                <div id="calendar" class="p-4"></div>
            </div>

            <!-- Task List -->
            <div class="bg-white rounded-2xl shadow-xl border border-green-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100">
                    <h2 class="text-2xl font-semibold text-emerald-800 flex items-center gap-3">
                        <i class="fas fa-list-check text-green-600"></i> Today's & Upcoming Tasks
                    </h2>
                </div>
                <div id="task-list" class="p-6 space-y-4 max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- Weather Forecast Section -->
        <div class="mt-10 bg-white rounded-2xl shadow-xl p-8 border border-green-100">
            <h2 class="text-2xl font-semibold text-emerald-800 mb-6 flex items-center gap-3">
                <i class="fas fa-cloud-sun-rain text-green-600"></i> 7-Day Farming Weather Forecast
            </h2>
            <div id="weather-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-7 gap-4"></div>
            <p id="weather-location" class="mt-4 text-center text-gray-600 italic"></p>
        </div>
    </main>

    <!-- Edit Modal (unchanged) -->
    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
            <h3 class="text-xl font-bold text-emerald-800 mb-6 flex items-center gap-3">
                <i class="fas fa-edit text-green-600"></i> Edit Task
            </h3>
            <input type="date" id="edit-date" class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-green-500">
            <input type="text" id="edit-title" placeholder="Task description" class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-6 focus:ring-2 focus:ring-green-500">
            <div class="flex gap-3">
                <button id="save-edit" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-medium transition">Save Changes</button>
                <button id="delete-task" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-medium transition">Delete</button>
                <button id="cancel-edit" class="flex-1 bg-gray-200 hover:bg-gray-300 py-3 rounded-lg font-medium transition">Cancel</button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
